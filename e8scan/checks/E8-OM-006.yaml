id: E8-OM-006
strategy: configure_office_macros
title: "Office macros disabled without notification (PowerPoint)"
ism_controls: ["ISM-1489"]
maturity_level: 2
platforms: [windows]
severity: high
check:
  type: registry
  hive: HKLM
  path: 'SOFTWARE\Policies\Microsoft\Office\16.0\PowerPoint\Security'
  key: vbawarnings
  expected: 4
remediation: >
  Set VBA macro notifications to "Disable all macros without notification" via Group Policy for PowerPoint.
  Set VBAWarnings = 4.
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
