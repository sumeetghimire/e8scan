id: E8-OM-005
strategy: configure_office_macros
title: "Office macros disabled without notification (Excel)"
ism_controls: ["ISM-1489"]
maturity_level: 2
platforms: [windows]
severity: high
check:
  type: registry
  hive: HKLM
  path: 'SOFTWARE\Policies\Microsoft\Office\16.0\Excel\Security'
  key: vbawarnings
  expected: 4
remediation: >
  Set VBA macro notifications to "Disable all macros without notification" via Group Policy for Excel.
  Set VBAWarnings = 4.
references:
  - https://www.cyber.gov.au/resources-business-and-government/essential-cyber-security/essential-eight
